<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FC Barcelona Tic Tac Toe</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; margin: 0; min-height: 100vh;
         background: linear-gradient(135deg, #004D98 0%, #001a3a 50%, #A50044 100%);
         color: #fff; display: flex; flex-direction: column; align-items: center; padding: 30px 20px;
         position: relative; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background:
      repeating-linear-gradient(90deg, rgba(165,0,68,0.08) 0px, rgba(165,0,68,0.08) 60px, rgba(0,77,152,0.08) 60px, rgba(0,77,152,0.08) 120px);
    pointer-events: none; z-index: 0;
  }
  body > * { position: relative; z-index: 1; }
  .barca-crest {
    width: 80px; height: 80px; margin-bottom: 10px; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
  }
  h1 { margin: 0 0 6px; font-size: 2em; text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
       background: linear-gradient(90deg, #EDBB00, #fff, #EDBB00);
       -webkit-background-clip: text; -webkit-text-fill-color: transparent;
       background-clip: text; }
  .sub { opacity: 0.85; margin-bottom: 20px; font-style: italic; letter-spacing: 0.5px; }

  .screen { width: 100%; max-width: 760px; }
  .hidden { display: none !important; }

  .pick-title { font-size: 1.2em; margin: 18px 0 10px; text-align: center;
                color: #EDBB00; text-shadow: 1px 1px 3px rgba(0,0,0,0.4); }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }
  .player {
    background: linear-gradient(135deg, rgba(0,77,152,0.3), rgba(165,0,68,0.3));
    border: 3px solid rgba(255,255,255,0.15); border-radius: 12px;
    padding: 14px 8px; cursor: pointer; text-align: center; transition: all 0.2s;
    backdrop-filter: blur(6px);
  }
  .player:hover { background: linear-gradient(135deg, rgba(0,77,152,0.5), rgba(165,0,68,0.5));
                  transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
  .player.selected { border-color: #EDBB00; background: linear-gradient(135deg, rgba(237,187,0,0.25), rgba(237,187,0,0.15));
                     box-shadow: 0 0 16px rgba(237,187,0,0.3); }
  .player.disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
  .avatar {
    width: 70px; height: 70px; border-radius: 50%; margin: 0 auto 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6em; font-weight: bold; color: #fff;
    border: 3px solid rgba(237,187,0,0.5);
    background-size: cover; background-position: center top;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
  }
  .pname { font-size: 0.9em; font-weight: 600; }

  button.primary {
    margin: 20px auto 0; display: block; padding: 12px 28px; font-size: 1.05em;
    background: linear-gradient(135deg, #EDBB00, #d4a200); color: #1a0a2e; border: none; border-radius: 8px;
    font-weight: bold; cursor: pointer; transition: all 0.15s;
    box-shadow: 0 4px 12px rgba(237,187,0,0.3);
  }
  button.primary:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 6px 20px rgba(237,187,0,0.5); }
  button.primary:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Game */
  .scoreboard { display: flex; justify-content: space-around; align-items: center;
                width: 100%; max-width: 460px; margin-bottom: 16px; }
  .side { text-align: center; padding: 10px 14px; border-radius: 10px;
          background: linear-gradient(135deg, rgba(0,77,152,0.4), rgba(165,0,68,0.4));
          border: 2px solid rgba(255,255,255,0.1);
          min-width: 130px; transition: all 0.2s; }
  .side.active { box-shadow: 0 0 0 3px #EDBB00, 0 0 20px rgba(237,187,0,0.3);
                 border-color: #EDBB00; }
  .side .avatar { width: 56px; height: 56px; font-size: 1.3em; margin-bottom: 4px; }
  .side .pname { font-size: 0.85em; }
  .vs { font-size: 1.4em; font-weight: bold; opacity: 0.7;
        color: #EDBB00; text-shadow: 0 0 8px rgba(237,187,0,0.4); }

  #status { font-size: 1.15em; min-height: 1.4em; margin-bottom: 12px; text-align: center; }

  #board { display: grid; grid-template-columns: repeat(3, 100px); gap: 8px;
           margin: 0 auto; padding: 10px;
           background: linear-gradient(135deg, rgba(0,77,152,0.5), rgba(165,0,68,0.5));
           border-radius: 12px; border: 2px solid rgba(237,187,0,0.2);
           box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
  .cell {
    width: 100px; height: 100px; background: rgba(255,255,255,0.9); border: none; border-radius: 8px;
    cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .cell:hover:not(:disabled) { background: #fff; box-shadow: 0 0 12px rgba(237,187,0,0.3); }
  .cell:disabled { cursor: default; }
  .cell .avatar { width: 72px; height: 72px; font-size: 1.5em; margin: 0; border-width: 2px; }
  .cell.win { background: linear-gradient(135deg, #EDBB00, #f5d442) !important;
              box-shadow: 0 0 16px rgba(237,187,0,0.5); }

  .controls { margin-top: 18px; display: flex; gap: 10px; justify-content: center; }
  .controls button {
    padding: 10px 18px; font-size: 0.95em;
    background: linear-gradient(135deg, rgba(0,77,152,0.4), rgba(165,0,68,0.4));
    color: #fff; border: 2px solid rgba(237,187,0,0.3); border-radius: 8px; cursor: pointer;
    transition: all 0.15s;
  }
  .controls button:hover { background: linear-gradient(135deg, rgba(0,77,152,0.6), rgba(165,0,68,0.6));
                           border-color: #EDBB00; box-shadow: 0 0 12px rgba(237,187,0,0.2); }

  .barca-watermark {
    position: fixed; bottom: 20px; right: 20px; width: 120px; opacity: 0.06;
    pointer-events: none; z-index: 0;
  }
  .barca-stripe { position: fixed; top: 0; bottom: 0; width: 100%; pointer-events: none; z-index: 0;
                  background: repeating-linear-gradient(90deg,
                    transparent 0%, transparent 14.28%,
                    rgba(165,0,68,0.03) 14.28%, rgba(165,0,68,0.03) 28.57%);
  }
</style>
</head>
<body>
  <img class="barca-crest" src="https://upload.wikimedia.org/wikipedia/en/thumb/4/47/FC_Barcelona_%28crest%29.svg/800px-FC_Barcelona_%28crest%29.svg.png" alt="FC Barcelona Crest">
  <h1>FC Barcelona Tic Tac Toe</h1>
  <div class="sub">Mes que un joc &mdash; Pick your Blaugrana legend</div>
  <img class="barca-watermark" src="https://upload.wikimedia.org/wikipedia/en/thumb/4/47/FC_Barcelona_%28crest%29.svg/800px-FC_Barcelona_%28crest%29.svg.png" alt="">

  <!-- SELECTION SCREEN -->
  <div id="select-screen" class="screen">
    <div class="pick-title" id="pick-title">Step 1: Choose your player</div>
    <div class="grid" id="player-grid"></div>
    <button class="primary" id="start-btn" disabled>Kick Off</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="screen hidden">
    <div class="scoreboard">
      <div class="side" id="side-you">
        <div class="avatar" id="you-avatar"></div>
        <div class="pname" id="you-name"></div>
      </div>
      <div class="vs">VS</div>
      <div class="side" id="side-cpu">
        <div class="avatar" id="cpu-avatar"></div>
        <div class="pname" id="cpu-name"></div>
      </div>
    </div>
    <div id="status"></div>
    <div id="board"></div>
    <div class="controls">
      <button id="rematch">Rematch</button>
      <button id="change">Change Players</button>
    </div>
  </div>

<script>
  const PLAYERS = [
    { id: 'messi',    name: 'Messi',             initials: 'M',  color: '#004D98', wiki: 'Lionel_Messi' },
    { id: 'dinho',    name: 'Ronaldinho',        initials: 'R10',color: '#A50044', wiki: 'Ronaldinho' },
    { id: 'xavi',     name: 'Xavi',              initials: 'X',  color: '#004D98', wiki: 'Xavi' },
    { id: 'iniesta',  name: 'Iniesta',           initials: 'AI', color: '#A50044', wiki: 'Andrés_Iniesta' },
    { id: 'puyol',    name: 'Puyol',             initials: 'CP', color: '#004D98', wiki: 'Carles_Puyol' },
    { id: 'r9',       name: 'Ronaldo Nazário',   initials: 'R9', color: '#A50044', wiki: 'Ronaldo_(Brazilian_footballer)' },
    { id: 'cruyff',   name: 'Cruyff',            initials: 'JC', color: '#EDBB00', wiki: 'Johan_Cruyff' },
  ];

  // Fetch player photos from Wikipedia (falls back to initials if it fails)
  async function loadPhotos() {
    await Promise.all(PLAYERS.map(async p => {
      try {
        const r = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${p.wiki}`);
        const j = await r.json();
        if (j.thumbnail && j.thumbnail.source) p.img = j.thumbnail.source;
      } catch (e) { /* ignore, fallback to initials */ }
    }));
    renderGrid();
  }

  function setAvatar(el, p) {
    el.style.background = p.color;
    if (p.img) {
      el.style.backgroundImage = `url("${p.img}")`;
      el.textContent = '';
    } else {
      el.textContent = p.initials;
    }
  }
  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  let you = null, cpu = null;
  let cells, turn, over; // turn: 'you' | 'cpu'

  // ---------- Selection ----------
  const grid = document.getElementById('player-grid');
  const pickTitle = document.getElementById('pick-title');
  const startBtn = document.getElementById('start-btn');

  function renderGrid() {
    grid.innerHTML = '';
    PLAYERS.forEach(p => {
      const card = document.createElement('div');
      card.className = 'player';
      if (you && you.id === p.id && !cpu) card.classList.add('selected');
      if (cpu && cpu.id === p.id) card.classList.add('selected');
      if (you && !cpu && you.id === p.id) card.classList.add('selected');
      // Disable already-picked-by-you when picking opponent
      if (you && !cpu && you.id === p.id) { /* still show as selected but allow re-pick? no */ }
      if (you && !cpu && p.id === you.id) card.classList.add('disabled');

      card.innerHTML = `<div class="avatar"></div><div class="pname">${p.name}</div>`;
      setAvatar(card.querySelector('.avatar'), p);
      card.addEventListener('click', () => choose(p));
      grid.appendChild(card);
    });
  }

  function choose(p) {
    if (!you) {
      you = p;
      pickTitle.textContent = 'Step 2: Choose your opponent';
    } else if (!cpu) {
      if (p.id === you.id) return;
      cpu = p;
      startBtn.disabled = false;
    }
    renderGrid();
  }

  startBtn.addEventListener('click', startGame);

  // ---------- Game ----------
  const boardEl = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const sideYou = document.getElementById('side-you');
  const sideCpu = document.getElementById('side-cpu');

  function startGame() {
    document.getElementById('select-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');

    setAvatar(document.getElementById('you-avatar'), you);
    document.getElementById('you-name').textContent = you.name;
    setAvatar(document.getElementById('cpu-avatar'), cpu);
    document.getElementById('cpu-name').textContent = cpu.name;

    resetBoard();
  }

  function resetBoard() {
    cells = Array(9).fill(null);
    turn = 'you';
    over = false;
    boardEl.innerHTML = '';
    for (let i = 0; i < 9; i++) {
      const btn = document.createElement('button');
      btn.className = 'cell';
      btn.dataset.i = i;
      btn.addEventListener('click', () => onPlayerMove(i));
      boardEl.appendChild(btn);
    }
    updateStatus();
  }

  function updateStatus() {
    sideYou.classList.toggle('active', turn === 'you' && !over);
    sideCpu.classList.toggle('active', turn === 'cpu' && !over);
    if (!over) statusEl.textContent = turn === 'you' ? `Your move, ${you.name}` : `${cpu.name} is thinking...`;
  }

  function placeMark(i, who) {
    cells[i] = who;
    const cellBtn = boardEl.children[i];
    const p = who === 'you' ? you : cpu;
    const av = document.createElement('div');
    av.className = 'avatar';
    setAvatar(av, p);
    cellBtn.appendChild(av);
    cellBtn.disabled = true;
  }

  function onPlayerMove(i) {
    if (over || cells[i] || turn !== 'you') return;
    placeMark(i, 'you');
    if (checkEnd()) return;
    turn = 'cpu';
    updateStatus();
    setTimeout(cpuMove, 450);
  }

  function cpuMove() {
    const i = bestMove(cells);
    placeMark(i, 'cpu');
    if (checkEnd()) return;
    turn = 'you';
    updateStatus();
  }

  function checkEnd() {
    const w = WINS.find(([a,b,c]) => cells[a] && cells[a] === cells[b] && cells[b] === cells[c]);
    if (w) {
      over = true;
      w.forEach(idx => boardEl.children[idx].classList.add('win'));
      const winner = cells[w[0]] === 'you' ? you.name + ' wins! 🏆' : cpu.name + ' wins! 🏆';
      statusEl.textContent = winner;
      [...boardEl.children].forEach(c => c.disabled = true);
      sideYou.classList.remove('active'); sideCpu.classList.remove('active');
      return true;
    }
    if (cells.every(Boolean)) {
      over = true;
      statusEl.textContent = "It's a draw! 🤝";
      sideYou.classList.remove('active'); sideCpu.classList.remove('active');
      return true;
    }
    return false;
  }

  // Minimax — CPU is 'cpu' (maximizer), human is 'you'
  function winnerOf(b) {
    for (const [a,b1,c] of WINS) if (b[a] && b[a] === b[b1] && b[b1] === b[c]) return b[a];
    if (b.every(Boolean)) return 'draw';
    return null;
  }
  function minimax(b, player) {
    const w = winnerOf(b);
    if (w === 'cpu') return { score: 10 };
    if (w === 'you') return { score: -10 };
    if (w === 'draw') return { score: 0 };
    const moves = [];
    for (let i = 0; i < 9; i++) {
      if (!b[i]) {
        b[i] = player;
        const res = minimax(b, player === 'cpu' ? 'you' : 'cpu');
        moves.push({ i, score: res.score });
        b[i] = null;
      }
    }
    if (player === 'cpu') return moves.reduce((a,m) => m.score > a.score ? m : a, { score: -Infinity });
    return moves.reduce((a,m) => m.score < a.score ? m : a, { score: Infinity });
  }
  function bestMove(b) { return minimax(b.slice(), 'cpu').i; }

  document.getElementById('rematch').addEventListener('click', resetBoard);
  document.getElementById('change').addEventListener('click', () => {
    you = null; cpu = null;
    startBtn.disabled = true;
    pickTitle.textContent = 'Step 1: Choose your player';
    document.getElementById('game-screen').classList.add('hidden');
    document.getElementById('select-screen').classList.remove('hidden');
    renderGrid();
  });

  renderGrid();
  loadPhotos();
</script>
</body>
</html>
